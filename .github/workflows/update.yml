# test update mechanism
name: Update

on:
  push:
    branches: 
      - main
    paths:
      - scripts/*
      - .github/workflows/update.yml
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

env:
  DOCKER_CLI_EXPERIMENTAL: enabled
  REPOSITORY: ${{ github.actor }}/${{ github.workflow }} 

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: read-all

jobs:

  update-docker:
    runs-on: ubuntu-26.04
    permissions:
      id-token: write

    steps:
#      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0
#        with:
#          config: ${{ vars.PERMISSIONS_CONFIG }} 
      
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block # TODO: change to 'egress-policy: block' after couple of runs
          disable-sudo: false
          disable-telemetry: false
          allowed-endpoints: >
            api.github.com:443
            cdn.fwupd.org:443
            fulcio.sigstore.dev:443
            github.com:443
            hosted-compute-watchdog-prod-iad-01.githubapp.com:443
            objects.githubusercontent.com:443
            packages.microsoft.com:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      # checkout with a PAT configured with workflow access to allow the workflow to check changes back in
      - name: Source checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.UPDATE_SECRET }} 
          fetch-depth: 1

#      - uses: chainguard-dev/actions/setup-gitsign@88f70f8cd86f2ab5e0dc1b40f94df0a56ba29db5
      - name: Setup SSH keys
        env:
          BOT_SSH_PRIVATE_KEY: ${{ secrets.JBOT_SSH_PRIVATE_KEY }}
          BOT_SSH_PUBLIC_KEY: ${{ secrets.JBOT_SSH_PUBLIC_KEY }}
        run: |
          mkdir -m 700 -p ~/.ssh
          echo "$BOT_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          echo "$BOT_SSH_PUBLIC_KEY" > ~/.ssh/id_ed25519.pub
          chmod 600 ~/.ssh/id_ed25519
          chmod 644 ~/.ssh/id_ed25519.pub

      - name: Update Dockerfile versions
        run: |
          git config --global user.name "Jauder Ho Bot"
          git config --global user.email "jauderho-bot@users.noreply.github.com"
          git config --global user.signingkey ~/.ssh/id_ed25519.pub
          git config --global gpg.format ssh
          git config --global commit.gpgsign true
          PAT="${{ github.actor }}/${{ secrets.UPDATE_SECRET }}" scripts/updateDockerDeps.sh
          rm -rf ~/.ssh

  update-python-uv:
    needs: update-docker
    runs-on: ubuntu-26.04
    permissions:
      id-token: write

    steps:
#      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0
#        with:
#          config: ${{ vars.PERMISSIONS_CONFIG }} 
      
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block # TODO: change to 'egress-policy: block' after couple of runs
          disable-sudo: false
          disable-telemetry: false
          allowed-endpoints: >
            api.github.com:443
            azure.archive.ubuntu.com:80
            download.pytorch.org:443
            files.pythonhosted.org:443
            github.com:443
            objects.githubusercontent.com:443
            packages.microsoft.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            releases.astral.sh:443
            www.piwheels.org:443

      # checkout with a PAT configured with workflow access to allow the workflow to check changes back in
      - name: Source checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.UPDATE_SECRET }} 
          fetch-depth: 1

#      - uses: chainguard-dev/actions/setup-gitsign@88f70f8cd86f2ab5e0dc1b40f94df0a56ba29db5
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-cache: true
          # Key the uv cache only on pyproject.toml (stable between runs). This
          # workflow rewrites uv.lock/requirements.txt every run, so the default
          # glob churned a new ~440 MiB cache entry per run and pegged the 10 GiB cap.
          cache-dependency-glob: "**/pyproject.toml"
#          python-version: 3.14

      - name: Setup SSH keys
        env:
          BOT_SSH_PRIVATE_KEY: ${{ secrets.JBOT_SSH_PRIVATE_KEY }}
          BOT_SSH_PUBLIC_KEY: ${{ secrets.JBOT_SSH_PUBLIC_KEY }}
        run: |
          mkdir -m 700 -p ~/.ssh
          echo "$BOT_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          echo "$BOT_SSH_PUBLIC_KEY" > ~/.ssh/id_ed25519.pub
          chmod 600 ~/.ssh/id_ed25519
          chmod 644 ~/.ssh/id_ed25519.pub

      - name: Update Python dependencies
        env:
          LOCK_JOBS: 6
        run: |
          git config --global user.name "Jauder Ho Bot"
          git config --global user.email "jauderho-bot@users.noreply.github.com"
          git config --global user.signingkey ~/.ssh/id_ed25519.pub
          git config --global gpg.format ssh
          git config --global commit.gpgsign true
          scripts/updatePythonDepsUV.sh
          rm -rf ~/.ssh
